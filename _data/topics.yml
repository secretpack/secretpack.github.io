# 좌측 "Topics" 네비게이션의 기본 주제 순서/이름.
#
# - category : 글 front matter 의 `categories:` 값과 정확히 일치해야 합니다.
#              (예: categories: [Reverse Engineering])
# - label    : (선택) 네비에 표시할 이름. 없으면 category 를 그대로 사용.
